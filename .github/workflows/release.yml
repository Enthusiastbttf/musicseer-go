name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege, scoped per job: the binary job creates the GitHub release
# (contents: write); the image job only pushes to GHCR (packages: write).
permissions:
  contents: read

jobs:
  binary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build a fully static linux/amd64 binary inside Alpine (musl), so it
      # runs on any distro — including a Debian 13 Proxmox LXC.
      - name: Build static binary
        run: |
          docker build --target build -t musicseer-build \
            --build-arg VERSION=${GITHUB_REF_NAME#v} \
            --build-arg STATIC=1 .
          docker create --name extract musicseer-build
          docker cp extract:/musicseer musicseer-linux-amd64
          docker rm extract
          file musicseer-linux-amd64

      # Publish a checksum so the in-app updater can verify the download before
      # swapping the running binary.
      - name: Checksum
        run: sha256sum musicseer-linux-amd64 > checksums.txt

      # Publish with the preinstalled gh CLI rather than a third-party action —
      # fewer moving parts and a readable error if anything fails.
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            musicseer-linux-amd64 checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Docker image names must be lowercase; github.repository may not be.
      - name: Compute image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.ref_name }}
