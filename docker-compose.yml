# MusicSeer 2 — single service, single volume. No database container needed.
services:
  musicseer:
    build: .
    # or, once you publish an image: image: ghcr.io/Enthusiastbttf/musicseer-go:latest
    container_name: musicseer
    restart: unless-stopped
    ports:
      - "8688:8688"
    environment:
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}   # optional — keyless ListenBrainz used when empty
      MUSICBRAINZ_CONTACT: ${MUSICBRAINZ_CONTACT:-admin@example.com}
      # MUSICSEER_TRENDING_INTERVAL: 6h
      # MUSICSEER_LIBRARY_INTERVAL: 12h
    volumes:
      - musicseer_data:/data

volumes:
  musicseer_data:
